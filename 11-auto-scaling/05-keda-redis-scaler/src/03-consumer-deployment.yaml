apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-list-consumer
  namespace: keda-demo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: redis-list-consumer
  template:
    metadata:
      labels:
        app: redis-list-consumer
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: consumer
          image: redis:7   # glibc-based — see the musl/Alpine DNS note in Concepts
          command: ["sh", "-c"]
          args:
            - |
              while true; do
                redis-cli -h "$REDIS_HOST" -a "$REDIS_PASSWORD" BRPOP work-queue 5
                sleep 1
              done
          env:
            - name: REDIS_HOST
              value: redis-queue-master.keda-demo.svc.cluster.local
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-queue
                  key: redis-password
