apiVersion: apps/v1
kind: Deployment
metadata:
  name: surge-stall-demo
spec:
  replicas: 3
  progressDeadlineSeconds: 30   # lowered from the 600s default purely so
                                 # ProgressDeadlineExceeded is observable
                                 # in this exercise without a long wait
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: surge-stall-demo
  template:
    metadata:
      labels:
        app: surge-stall-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.28.3
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
