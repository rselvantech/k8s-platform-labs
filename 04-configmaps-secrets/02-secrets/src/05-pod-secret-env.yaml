apiVersion: v1
kind: Pod
metadata:
  name: pod-secret-env
  namespace: default
spec:
  containers:
  - name: app
    image: busybox:1.36
    command: ["sh", "-c", "sleep 3600"]
    env:
    # secretKeyRef: identical pattern to configMapKeyRef — same fields, same behaviour
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: db-credentials   # Secret name
          key: username          # key inside the Secret
    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: password
          # optional: true       # if true and secret/key missing: pod starts, var is ABSENT
    - name: API_KEY
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: api-key
    # envFrom for Secrets — loads ALL keys as env vars (same as ConfigMap envFrom):
    # envFrom:
    # - secretRef:
    #     name: db-credentials
  restartPolicy: Never
