apiVersion: apps/v1
kind: Deployment
metadata:
  name: recreate-stall-demo
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: recreate-stall-demo
  template:
    metadata:
      labels:
        app: recreate-stall-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.28.3
