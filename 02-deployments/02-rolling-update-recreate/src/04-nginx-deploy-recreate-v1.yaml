apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-recreate-demo
  annotations:
    kubernetes.io/change-cause: "Initial Recreate-strategy deployment with nginx:1.28.3"
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nginx-recreate-demo
  template:
    metadata:
      labels:
        app: nginx-recreate-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.28.3
          ports:
            - containerPort: 80
