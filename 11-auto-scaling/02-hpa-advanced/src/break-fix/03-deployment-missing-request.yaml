apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-container-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-container-app
  template:
    metadata:
      labels:
        app: multi-container-app
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

        - name: sidecar
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          resources:
            requests:
              memory: "32Mi"    # BUG: cpu request missing on this container
            limits:
              cpu: "500m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: multi-container-svc
spec:
  type: ClusterIP
  selector:
    app: multi-container-app
  ports:
    - port: 80
      targetPort: 80
