apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-container-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multi-container-app
  template:
    metadata:
      labels:
        app: multi-container-app
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        # Primary application container
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"      # ContainerResource HPA in Step 2 reads THIS container's usage
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

        # Sidecar container — simulates a logging/monitoring agent
        - name: sidecar
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: "100m"      # has its own request — reports its own utilisation %
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: multi-container-svc
spec:
  type: ClusterIP
  selector:
    app: multi-container-app
  ports:
    - port: 80
      targetPort: 80
