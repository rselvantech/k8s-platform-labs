apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ci
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx
        image: nginx:1.30.3     # Docker Official Image — pinned to the current stable line
        ports:
        - containerPort: 80
