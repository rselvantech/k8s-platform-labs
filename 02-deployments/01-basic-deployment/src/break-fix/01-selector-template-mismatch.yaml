apiVersion: apps/v1
kind: Deployment
metadata:
  name: mismatch-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mismatch-demo
  template:
    metadata:
      labels:
        app: mismatch-demo-typo    # doesn't satisfy the selector above
    spec:
      containers:
        - name: nginx
          image: nginx:1.30.4
