apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-no-requests
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-no-requests
  template:
    metadata:
      labels:
        app: nginx-no-requests
    spec:
      terminationGracePeriodSeconds: 0
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          # BUG: no resources block at all — no requests, no limits
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-no-requests
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx-no-requests
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: nginx
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: 2
          memory: 2Gi
